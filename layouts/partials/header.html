<nav role="navigation" aria-label="Main navigation">
    <div class="container">
        <div class="nav-container">

            <!-- LOGO -->
            <a href="{{ .Site.BaseURL }}" class="logo" aria-label="{{ .Site.Title }} - Home">
              {{ if .Site.Params.logoSVG }}
                <img
                  src="{{ .Site.Params.logoSVG | relURL }}"
                  alt="{{ .Site.Title }}"
                  class="logo-icon"
                  width="32"
                  height="32"
                />
              {{ end }}
              <span class="logo-text">{{ .Site.Params.logo | default "RITHAMETRICS" }}</span>
            </a>

            <ul class="nav-links" id="nav-menu">
              <li><a href="{{ .Site.BaseURL }}">Home</a></li>
              <li><a href="#services">Services</a></li>
              <li><a href="#process">Process</a></li>
              <li><a href="#contact">Contact</a></li>

              <!-- Mobile only — hidden on desktop via CSS -->
              <li class="mobile-only">
                <a href="{{ .Site.Params.whatsapp }}" class="btn btn-primary">💬 WhatsApp</a>
              </li>
              <li class="mobile-only lang-switcher-mobile">
                {{ range .Site.Languages }}
                <a href="{{ if eq .Lang "zh" }}{{ $.Site.BaseURL }}{{ else }}{{ $.Site.BaseURL }}{{ .Lang }}/{{ end }}"
                   class="lang-link {{ if eq .Lang $.Site.Language.Lang }}active{{ end }}">
                  {{ .Lang | upper }}
                </a>
                {{ end }}
              </li>
            </ul>

            <!-- CTA (FIXED: use theme button styles) -->
            <a href="{{ .Site.Params.whatsapp }}" class="btn btn-primary">
                💬 WhatsApp
            </a>

            <!-- LANGUAGE SWITCHER -->
            <div class="lang-switcher" role="group" aria-label="Language selection">
                {{ range .Site.Languages }}
                <a href="{{ if eq .Lang "zh" }}{{ $.Site.BaseURL }}{{ else }}{{ $.Site.BaseURL }}{{ .Lang }}/{{ end }}" 
                   class="lang-link {{ if eq .Lang $.Site.Language.Lang }}active{{ end }}" 
                   aria-label="Switch to {{ .LanguageName }}" 
                   {{ if eq .Lang $.Site.Language.Lang }}aria-current="true"{{ end }}>
                   {{ .Lang | upper }}
                </a>
                {{ end }}
            </div>

            <!-- MOBILE BUTTON -->
            <button class="mobile-menu-btn" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation menu">
                ☰
            </button>

        </div>
    </div>
</nav>
